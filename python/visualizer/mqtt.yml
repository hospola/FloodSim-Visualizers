# DanaSim simulation monitor configuration

sim_config: /kaggle/input/datasets/mariocarseg/configs/simulation_quickstart_windows_mqtt.yaml

mqtt:
  host: localhost
  port: 1883
  client_id: Danasim_Monitor_Viewer
  scenario: quickstart_valencia_demo
  qos_events: 1
  handshake_timeout: 5.0
  handshake_max_retries: 3
  keepalive: 60
  frame_timeout: 36000      # seconds to wait for FrameEnd before discarding (12 min)

renderer:
  type: csv          # options: csv, x3d, 2d
  output_folder: sim_outputs
  depth_provider: palette  # options: palette, direct

csv:
  water_threshold: 0.0005

x3d:
  subsample: 1
  lod_chunk: 256
  lod_subsamples: [1, 4, 16]
  lod_ranges: [5000.0, 20000.0]

visualizer:
  # How to populate the initial flood state.
  # - mqtt: wait for EYE_SetState_Layer messages from the simulator (original behaviour)
  # - file: read the water_depth layer directly from disk (reduces simulator RAM usage)
  initial_state_source: file
